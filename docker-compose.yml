services:
  webapp:
    build: .
    image: f1prediction-webapp:latest
    container_name: f1prediction-webapp
    ports:
      # Direct host-port access for debugging; Caddy reverse-proxies on the
      # caddy_shared network for the friendly f1.servy.lan URL.
      - "8000:8000"
    networks:
      - default
      - caddy_shared
    environment:
      # Disable wandb in deployed containers — training calls should_log=True
      # which tries to initialise wandb, and headless boxes don't have an API
      # key configured. Override to `offline` if you want local-only runs you
      # can `wandb sync` later, or unset entirely on a box with creds.
      WANDB_MODE: disabled
    # State that must survive container rebuilds is bind-mounted from the
    # repo. Anything the app writes to (data, cache, models, predictions DB)
    # lands on the host and is inspectable from outside the container.
    volumes:
      - ./data:/app/data
      - ./cache:/app/cache
      - ./webapp_config:/app/webapp_config
      - ./webapp_models:/app/webapp_models
      - ./webapp.db:/app/webapp.db
      # Training artefacts — optional; comment out if you don't run sweeps
      # or refits inside the container.
      - ./runs:/app/runs
      - ./logs:/app/logs
    restart: unless-stopped

networks:
  # Shared with the Caddy stack at ~/caddy/compose.yaml on the host, which
  # reverse-proxies http://f1.servy.lan to this service by container name.
  caddy_shared:
    external: true
