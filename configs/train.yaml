defaults:
  - model: mlp

training:
  seed: 42
  lr: 0.001
  patience: 10
  min_delta: 0.0001
  batch_size: 256
  gradient_accumulation: 4
  driver_dropout: 0.2
  loss: mae
  optimizer: adam
  device: cpu
  target_sessions: [Sprint, Q, R]
  years: [2018, 2019, 2020, 2021, 2022, 2023, 2024, 2025, 2026]
  data_dir: data
  output_dir: runs
