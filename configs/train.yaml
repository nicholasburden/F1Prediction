defaults:
  - model: xgboost

data:
  data_dir: data
  years: [2020, 2021, 2022, 2023, 2024]
  train_frac: 0.7
  val_frac: 0.15
  max_drivers: 22
  batch_size: 32
  feature_tiers: null  # null = all tiers (core, form, derived)
  lookback: 5
  prepared_dir: null

training:
  seed: 42
  output_dir: runs

wandb:
  group: null  # set to group related runs (e.g. "sweep_xgb_v1")

hydra:
  run:
    dir: ${training.output_dir}
  job:
    chdir: false
