name: Deploy to servy

# Runs on the self-hosted runner on servy whenever main advances (i.e. a merge
# to main). Operates on the bind-mounted repo at ~/F1Prediction — the clone
# that docker compose mounts — rather than a fresh checkout.

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-servy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: [self-hosted, servy]
    steps:
      - name: Pull latest main
        run: |
          cd "$HOME/F1Prediction"
          git fetch origin main
          git pull --ff-only origin main

      - name: Rebuild and restart container
        run: |
          cd "$HOME/F1Prediction"
          docker compose up -d --build

      - name: Health check
        run: |
          cd "$HOME/F1Prediction"
          for i in $(seq 1 30); do
            code=$(curl -fsS -o /dev/null -w "%{http_code}" http://127.0.0.1:8000/ 2>/dev/null || true)
            if [ "$code" = "200" ]; then echo "healthy after $((i*2))s"; exit 0; fi
            sleep 2
          done
          echo "health check failed — recent logs:"
          docker compose logs --tail=40 webapp
          exit 1
